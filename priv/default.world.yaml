          campaign_writer:
            slug: "campaign_writer"
            name: "Cam Campaign Writer"
            status: "active"
            collaboration_role: "worker"
            description: "Creates campaign concepts from research briefs."
            instructions: "Write campaign angles, audience fit, key message, and channel-ready assets from supplied research."
