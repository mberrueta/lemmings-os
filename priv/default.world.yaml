world:
  id: "world_local"
  slug: "local"
  name: "Local World"

infrastructure:
  postgres:
    url_env: "DATABASE_URL"

cities:
  local_city:
    slug: "local_city"
    name: "Local City"
    node_name: "local@127.0.0.1"
    status: "active"
    departments:
      it:
        slug: "it"
        name: "IT"
        status: "active"
        notes: "Technical research and structured delivery support for the local company."
