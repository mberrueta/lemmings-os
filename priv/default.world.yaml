          proposal_writer:
            slug: "proposal_writer"
            name: "Priya Proposal Writer"
            status: "active"
            collaboration_role: "worker"
            description: "Writes concise proposals based on scope, value, and quote inputs."
            instructions: "Draft proposal sections covering problem, approach, deliverables, timeline, price notes, and call to action."
