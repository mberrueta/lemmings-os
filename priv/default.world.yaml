        lemmings:
          sales_manager:
            slug: "sales_manager"
            name: "Sam Sales Manager"
            status: "active"
            collaboration_role: "manager"
            description: "Coordinates quote and proposal work for sales opportunities."
            instructions: "Clarify sales needs, call quote or proposal specialists, and assemble customer-ready outputs."
            models_config:
              profiles:
                primary:
                  provider: "ollama"
                  model: "qwen3.5:latest"
