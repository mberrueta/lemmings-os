          - "technology"
          - "support"
        lemmings:
          it_manager:
            slug: "it_manager"
            name: "Iris Tech Manager"
            status: "active"
            collaboration_role: "manager"
            description: "Coordinates IT specialists and routes technical work to the right worker."
            instructions: "Triage technical requests, assign research or writing work to IT specialists, and return concise implementation-ready answers."
            models_config:
              profiles:
                primary:
                  provider: "ollama"
                  model: "qwen3.5:latest"
            tools_config:
              allowed_tools:
                - "lemming.call"
          web_researcher:
            slug: "web_researcher"
            name: "Wes Web Researcher"
            status: "active"
            collaboration_role: "worker"
            description: "Finds public web information and extracts source-backed facts."
