            collaboration_role: "worker"
            description: "Writes short social posts adapted to campaign goals."
            instructions: "Create platform-ready social posts with concise hooks, body copy, and optional hashtags."
            models_config:
              profiles:
                primary:
                  provider: "ollama"
                  model: "qwen3.5:latest"
