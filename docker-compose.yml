# docker-compose.yml -- Local multi-city demo for LemmingsOS
#
# Starts one world/control-plane node (with web UI) and two city nodes.
#
# Option A — managed Postgres (default, spins up a db container):
#   cp .env.example .env   # fill in SECRET_KEY_BASE
#   docker compose --profile db up --build
#
# Option B — external Postgres (you already have PG running):
#   cp .env.example .env   # fill in SECRET_KEY_BASE + DATABASE_URL
#   docker compose up --build
#
# Gotenberg runs on the private Compose network and is not published to host.
# For dev-only workflows using a host-local Gotenberg, set:
#   LEMMINGS_GOTENBERG_URL=http://host.docker.internal:3000
#
# The world node runs migrations on startup, then starts the Phoenix server.
# City nodes just start the app with their own CITY_* identity env vars.
# Stopping a city container causes its heartbeat to stop, making it stale
# in the UI after the configured freshness threshold (default 90s).

services:
  db:
    profiles: [db]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-lemmings_os_prod}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - lemmings_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  gotenberg:
    image: gotenberg/gotenberg:8
    expose:
      - "3000"
    networks:
      - lemmings_internal

  world:
    build: .
    depends_on:
      db:
        condition: service_healthy
        required: false
      gotenberg:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL:-ecto://postgres:postgres@db/lemmings_os_prod}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      PHX_HOST: ${PHX_HOST:-localhost}
      PORT: "${PHX_PORT:-4000}"
      PHX_SERVER: "true"
      LEMMINGS_GOTENBERG_URL: ${LEMMINGS_GOTENBERG_URL:-http://gotenberg:3000}
      LEMMINGS_CITY_NODE_NAME: "world@world"
      LEMMINGS_CITY_SLUG: "world"
      LEMMINGS_CITY_NAME: "World Node"
      LEMMINGS_CITY_HOST: "world"
      RELEASE_DISTRIBUTION: "none"
    ports:
      - "${PHX_PORT:-4000}:${PHX_PORT:-4000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - lemmings_internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:$${PORT:-4000}/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    entrypoint: >
      /bin/sh -c '
        /app/bin/lemmings_os eval "LemmingsOs.Release.create_and_migrate()" &&
        /app/bin/lemmings_os start
      '

  city_a:
    build: .
    depends_on:
      world:
        condition: service_healthy
      gotenberg:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL:-ecto://postgres:postgres@db/lemmings_os_prod}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      PHX_HOST: "localhost"
      LEMMINGS_GOTENBERG_URL: ${LEMMINGS_GOTENBERG_URL:-http://gotenberg:3000}
      LEMMINGS_CITY_NODE_NAME: "city_a@city_a"
      LEMMINGS_CITY_SLUG: "city-a"
      LEMMINGS_CITY_NAME: "City A"
      LEMMINGS_CITY_HOST: "city_a"
      RELEASE_DISTRIBUTION: "none"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - lemmings_internal

  city_b:
    build: .
    depends_on:
      world:
        condition: service_healthy
      gotenberg:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL:-ecto://postgres:postgres@db/lemmings_os_prod}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      PHX_HOST: "localhost"
      LEMMINGS_GOTENBERG_URL: ${LEMMINGS_GOTENBERG_URL:-http://gotenberg:3000}
      LEMMINGS_CITY_NODE_NAME: "city_b@city_b"
      LEMMINGS_CITY_SLUG: "city-b"
      LEMMINGS_CITY_NAME: "City B"
      LEMMINGS_CITY_HOST: "city_b"
      RELEASE_DISTRIBUTION: "none"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - lemmings_internal

volumes:
  pgdata:

networks:
  lemmings_internal:
