name: Bug Report
description: Report a reproducible problem in LemmingsOS
labels: ["type: bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this issue.
        Please provide enough detail for someone else to reproduce and validate a fix.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and did not find a duplicate
          required: true
        - label: I can reproduce this on the latest `main`
          required: true

  - type: textarea
    id: summary
    attributes:
      label: Bug summary
      description: What is wrong?
      placeholder: Concise description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps and inputs
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Submit ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happens?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs, stack traces, screenshots
      description: Paste only relevant snippets. Remove secrets and sensitive data.
      render: shell

  - type: input
    id: version
    attributes:
      label: Commit / version
      description: Git commit SHA or release version
      placeholder: e.g. 1a2b3c4 or v0.1.0

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Runtime details (OS, browser, Elixir/OTP, DB, deployment mode)
      placeholder: |
        - OS:
        - Browser:
        - Elixir:
        - Erlang/OTP:
        - Postgres:
        - Run mode: local/docker/release
